assert_lefthook_installed: true
glob_matcher: doublestar

commit-msg:
  jobs:
    - name: commitlint
      run: npx --no-install commitlint --edit

pre-commit:
  parallel: true
  jobs:
    - name: gofmt
      run: gofmt -w {staged_files}
      glob: "packages/cli/**/*.go"
      stage_fixed: true
    - name: prettier
      run: npx prettier {staged_files} --write --ignore-unknown
      glob: "**/*.*"
      stage_fixed: true
