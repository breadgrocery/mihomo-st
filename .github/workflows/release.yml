name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.output }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2025
            output: mihomo-st-windows-amd64.exe
          - runner: windows-11-arm
            output: mihomo-st-windows-arm64.exe
          - runner: ubuntu-24.04
            output: mihomo-st-linux-amd64
          - runner: ubuntu-24.04-arm
            output: mihomo-st-linux-arm64
          - runner: macos-15-intel
            output: mihomo-st-darwin-amd64
          - runner: macos-15
            output: mihomo-st-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: pwsh
        env:
          CGO_ENABLED: '0'
        run: New-Item -ItemType Directory -Force -Path dist | Out-Null; go build -trimpath -ldflags '-s -w' -o 'dist/${{ matrix.output }}' ./cmd/mihomo-st

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.output }}
          path: dist/*
          if-no-files-found: error

  github-release:
    name: github-release
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          fail_on_unmatched_files: true

  branch-release:
    name: branch-release
    runs-on: ubuntu-24.04
    needs: build
    if: github.ref_name != 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release
          folder: release-assets
          clean: true
          force: true
          single-commit: true
          commit-message: 'ci: update release'
